<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gradient Generator | Mini Project</title>
    <link rel="stylesheet" href ="style.css">
  </head>
  <body>
    <div class="container">
    <h1>BACKGROUND GRADIENT GENERATOR</h1>
    <section>
        <select id = "direction">
            <option value="to right">Left → Right</option>
            <option value="to left">Right → Left</option>
            <option value="to top">Bottom → Top</option>
            <option value="to bottom">Top → Bottom</option>
            <option value="to bottom right">Diagonal ↘</option>
        </select>
      <div class="buttons">
        <button id="btn1">#5C91E5</button>
        <button id="btn2">#983FC6</button>
      </div>
      <h2>Click below to copy the code!</h2>
      <div class="code">
        background-image: linear-gradient(to
        right,rgb(92,145,229),rgb(152,63,198))
      </div>
    </section>
    </div>
    <script src="script.js"></script>

  </body>
</html>
